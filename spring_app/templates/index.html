<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spring Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg:        #0f0f0f;
    --surface:   #181818;
    --border:    #2a2a2a;
    --accent:    #e8ff47;
    --accent2:   #ff6b35;
    --text:      #e0e0e0;
    --muted:     #666;
    --input-bg:  #111;
    --radius:    6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Header ── */
  header {
    width: 100%;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
  }
  .logo-icon {
    width: 34px; height: 34px;
    background: var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-icon svg { width: 18px; height: 18px; }
  header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.15rem;
    letter-spacing: -0.01em;
    color: #fff;
  }
  header span {
    font-size: 0.7rem;
    color: var(--muted);
    margin-left: auto;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── Main layout ── */
  main {
    display: flex;
    width: 100%;
    max-width: 1100px;
    padding: 32px 24px;
    gap: 32px;
    flex: 1;
  }

  /* ── Panel ── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    width: 320px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .panel-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  /* ── Parameter rows ── */
  .param {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .param label {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .param-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .param input[type="number"] {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
    -moz-appearance: textfield;
  }
  .param input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .param input[type="number"]:focus { border-color: var(--accent); }

  .stepper {
    display: flex;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .stepper button {
    background: var(--input-bg);
    border: none;
    color: var(--text);
    font-size: 1rem;
    width: 32px; height: 38px;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    font-family: 'DM Mono', monospace;
  }
  .stepper button:hover { background: var(--accent); color: #000; }

  /* ── Slider ── */
  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
    margin-top: 4px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid var(--bg);
  }

  /* ── Generate button ── */
  .btn-generate {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: var(--radius);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-top: 4px;
  }
  .btn-generate:hover { background: #d4eb2f; }
  .btn-generate:active { transform: scale(0.98); }
  .btn-generate:disabled {
    background: var(--border);
    color: var(--muted);
    cursor: not-allowed;
    transform: none;
  }

  /* ── Preview area ── */
  .preview-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .canvas-wrap {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    min-height: 400px;
    overflow: hidden;
  }

  #springViewport {
    width: 100%;
    height: 100%;
    display: block;
    cursor: grab;
  }
  #springViewport:active { cursor: grabbing; }

  .preview-label {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    pointer-events: none;
  }

  /* ── Status bar ── */
  .status {
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.04em;
    min-height: 40px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status.error { border-color: var(--accent2); color: var(--accent2); }
  .status.success { border-color: var(--accent); color: var(--accent); }

  /* ── Spinner ── */
  .spinner {
    width: 12px; height: 12px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #springViewport canvas {
    position: absolute;
    inset: 0;
  }
</style>
</head>
<body>

<header>
  <div class="logo-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round">
      <path d="M12 2 C6 2 4 6 4 9 C4 12 8 14 12 12 C16 10 20 12 20 15 C20 18 18 22 12 22"/>
    </svg>
  </div>
  <h1>Spring Generator</h1>
  <span>Local · No Cloud · No Credits</span>
</header>

<main>
  <!-- ── Control panel ── -->
  <div class="panel">
    <div class="panel-title">Customize</div>

    <div class="param">
      <label>Coils</label>
      <div class="param-row">
        <input type="number" id="coils" value="15" min="1" max="50" step="1">
        <div class="stepper">
          <button onclick="step('coils',-1)">−</button>
          <button onclick="step('coils',+1)">+</button>
        </div>
      </div>
    </div>

    <div class="param">
      <label>Thickness (mm)</label>
      <div class="param-row">
        <input type="number" id="thickness" value="1.7" min="0.2" max="20" step="0.1">
        <div class="stepper">
          <button onclick="step('thickness',-0.1)">−</button>
          <button onclick="step('thickness',+0.1)">+</button>
        </div>
      </div>
      <input type="range" id="thickness_range" min="0.2" max="10" step="0.1" value="1.7"
             oninput="sync('thickness',this.value)">
    </div>

    <div class="param">
      <label>Width (mm)</label>
      <div class="param-row">
        <input type="number" id="width" value="2" min="0.2" max="20" step="0.1">
        <div class="stepper">
          <button onclick="step('width',-0.1)">−</button>
          <button onclick="step('width',+0.1)">+</button>
        </div>
      </div>
      <input type="range" id="width_range" min="0.2" max="10" step="0.1" value="2"
             oninput="sync('width',this.value)">
    </div>

    <div class="param">
      <label>Pitch (mm)</label>
      <div class="param-row">
        <input type="number" id="pitch" value="4" min="0.5" max="50" step="0.5">
        <div class="stepper">
          <button onclick="step('pitch',-0.5)">−</button>
          <button onclick="step('pitch',+0.5)">+</button>
        </div>
      </div>
    </div>

    <div class="param">
      <label>Inside Diameter (mm)</label>
      <div class="param-row">
        <input type="number" id="inside_dia" value="6" min="1" max="200" step="0.5">
        <div class="stepper">
          <button onclick="step('inside_dia',-0.5)">−</button>
          <button onclick="step('inside_dia',+0.5)">+</button>
        </div>
      </div>
    </div>

    <div class="param">
      <label>Chamfer (mm)</label>
      <div class="param-row">
        <input type="number" id="chamfer" value="0.5" min="0" max="5" step="0.1">
        <div class="stepper">
          <button onclick="step('chamfer',-0.1)">−</button>
          <button onclick="step('chamfer',+0.1)">+</button>
        </div>
      </div>
    </div>

    <div class="param">
      <label>Support Gap (mm) <span style="color:var(--muted);font-size:0.65rem">— 0 = off</span></label>
      <div class="param-row">
        <input type="number" id="support_gap" value="0.25" min="0" max="5" step="0.05">
        <div class="stepper">
          <button onclick="step('support_gap',-0.05)">−</button>
          <button onclick="step('support_gap',+0.05)">+</button>
        </div>
      </div>
      <input type="range" id="support_gap_range" min="0" max="2" step="0.05" value="0.25"
             oninput="sync('support_gap',this.value)">
    </div>

    <button class="btn-generate" id="genBtn" onclick="generate()">⬇ Generate &amp; Download</button>
  </div>

  <!-- ── Preview + status ── -->
  <div class="preview-area">
    <div class="canvas-wrap">
      <div id="springViewport" aria-label="3D spring preview"></div>
      <div class="preview-label">3D preview — drag to orbit · scroll to zoom</div>
    </div>
    <div class="status" id="status">
      <div class="spinner" id="spinner"></div>
      <span id="statusText">Enter parameters and click Generate to download your STL.</span>
    </div>
  </div>
</main>

<script src="https://unpkg.com/three@0.164.1/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.164.1/examples/js/controls/OrbitControls.js"></script>
<script>
// ── Helpers ──────────────────────────────────────────────────────────────────
function v(id) { return parseFloat(document.getElementById(id).value) || 0; }

function step(id, delta) {
  const el = document.getElementById(id);
  const val = Math.round((parseFloat(el.value) + delta) * 1000) / 1000;
  el.value = val;
  const rng = document.getElementById(id + '_range');
  if (rng) rng.value = val;
  drawPreview();
}

function sync(id, val) {
  document.getElementById(id).value = parseFloat(val).toFixed(1);
  drawPreview();
}

// Update ranges on text input change
['thickness','width'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    const rng = document.getElementById(id+'_range');
    if (rng) rng.value = document.getElementById(id).value;
    drawPreview();
  });
});
['coils','pitch','inside_dia','chamfer','support_gap'].forEach(id => {
  document.getElementById(id).addEventListener('input', drawPreview);
});

// ── 3D Spring Preview (Three.js) ─────────────────────────────────────────────
let renderer;
let camera;
let scene;
let controls;
let springMesh = null;
let material;

function initThree() {
  const viewport = document.getElementById('springViewport');

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio || 1);
  viewport.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(45, 1, 0.1, 2000);
  camera.position.set(45, 35, 45);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.target.set(0, 0, 0);

  scene.add(new THREE.AmbientLight(0xffffff, 0.65));
  const keyLight = new THREE.DirectionalLight(0xffffff, 0.9);
  keyLight.position.set(35, 40, 25);
  scene.add(keyLight);

  material = new THREE.MeshStandardMaterial({
    color: 0xd6d6d6,
    metalness: 0.2,
    roughness: 0.45,
  });

  const grid = new THREE.GridHelper(120, 24, 0x333333, 0x222222);
  grid.position.y = -30;
  scene.add(grid);

  onResize();
  animate();
}

function buildSpringGeometry(coils, thickness, width, pitch, insideDia) {
  const path = new THREE.Curve();
  const turns = Math.max(1, coils);
  const totalAngle = turns * Math.PI * 2;
  const radius = insideDia / 2 + width / 2;
  const totalHeight = turns * pitch;

  path.getPoint = function(t) {
    const a = totalAngle * t;
    const x = radius * Math.cos(a);
    const z = radius * Math.sin(a);
    const y = -totalHeight / 2 + pitch * turns * t;
    return new THREE.Vector3(x, y, z);
  };

  const tubeRadius = Math.max(0.1, thickness / 2);
  return new THREE.TubeGeometry(path, Math.max(80, Math.round(turns * 90)), tubeRadius, 24, false);
}

function drawPreview() {
  if (!scene) return;
  const coils = Math.max(1, v('coils'));
  const thickness = Math.max(0.2, v('thickness'));
  const width = Math.max(0.2, v('width'));
  const pitch = Math.max(0.5, v('pitch'));
  const insideDia = Math.max(1, v('inside_dia'));

  if (springMesh) {
    scene.remove(springMesh);
    springMesh.geometry.dispose();
  }

  springMesh = new THREE.Mesh(
    buildSpringGeometry(coils, thickness, width, pitch, insideDia),
    material
  );
  scene.add(springMesh);

  const totalHeight = coils * pitch;
  const outerRadius = insideDia / 2 + width + thickness;
  const fit = Math.max(totalHeight, outerRadius * 2);
  camera.position.set(fit * 1.2, fit * 0.9, fit * 1.2);
  camera.near = 0.1;
  camera.far = fit * 20;
  camera.updateProjectionMatrix();
  controls.target.set(0, 0, 0);
  controls.update();
}

function onResize() {
  if (!renderer || !camera) return;
  const viewport = document.getElementById('springViewport');
  const w = Math.max(1, viewport.clientWidth);
  const h = Math.max(1, viewport.clientHeight);
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}

function animate() {
  requestAnimationFrame(animate);
  if (!renderer || !scene || !camera) return;
  controls.update();
  renderer.render(scene, camera);
}

window.addEventListener('resize', onResize);
initThree();
drawPreview();

// ── Generate & Download ───────────────────────────────────────────────────────
async function generate() {
  const btn = document.getElementById('genBtn');
  const spinner = document.getElementById('spinner');
  const statusEl = document.getElementById('status');
  const statusText = document.getElementById('statusText');

  btn.disabled = true;
  spinner.style.display = 'block';
  statusEl.className = 'status';
  statusText.textContent = 'Generating spring geometry…';

  const params = {
    coils:       v('coils'),
    thickness:   v('thickness'),
    width:       v('width'),
    pitch:       v('pitch'),
    inside_dia:  v('inside_dia'),
    chamfer:     v('chamfer'),
    support_gap: v('support_gap'),
    format:      'stl',
  };

  try {
    const res = await fetch('/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(params),
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || `HTTP ${res.status}`);
    }

    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const fname = `spring_c${params.coils}_id${params.inside_dia}_p${params.pitch}.stl`;
    a.href = url; a.download = fname; a.click();
    URL.revokeObjectURL(url);

    const kb = (blob.size / 1024).toFixed(1);
    statusEl.className = 'status success';
    statusText.textContent = `✓ Downloaded ${fname} (${kb} KB)`;
  } catch (e) {
    statusEl.className = 'status error';
    statusText.textContent = `✗ Error: ${e.message}`;
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
  }
}
</script>
</body>
</html>
