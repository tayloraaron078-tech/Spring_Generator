<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spring Generator — Redeemed 3D</title>
<link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg:        #090d16;
    --surface:   #0f1828;
    --border:    #1e3050;
    --accent:    #d42020;
    --accent-h:  #b81818;
    --accent2:   #1ab8e8;
    --text:      #e8eef5;
    --muted:     #5a7899;
    --input-bg:  #0a1020;
    --radius:    6px;
    --glow-r:    rgba(212, 32, 32, 0.35);
    --glow-b:    rgba(26, 184, 232, 0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Header ── */
  header {
    width: 100%;
    padding: 14px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
  }
  .logo-wrap {
    width: 46px;
    height: 46px;
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }
  .logo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .header-brand {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .brand-name {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.05rem;
    letter-spacing: 0.06em;
    line-height: 1;
  }
  .brand-red  { color: var(--accent);  text-shadow: 0 0 14px var(--glow-r); }
  .brand-blue { color: var(--accent2); text-shadow: 0 0 14px var(--glow-b); }
  .brand-sub {
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  header .badge {
    margin-left: auto;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── Main layout ── */
  main {
    display: flex;
    width: 100%;
    max-width: 1100px;
    padding: 32px 24px;
    gap: 32px;
    flex: 1;
  }

  /* ── Panel ── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    width: 320px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .panel-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  /* ── Parameter rows ── */
  .param {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .param label {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .param-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .param input[type="number"] {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
    -moz-appearance: textfield;
  }
  .param input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .param input[type="number"]:focus { border-color: var(--accent2); }

  .stepper {
    display: flex;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .stepper button {
    background: var(--input-bg);
    border: none;
    color: var(--text);
    font-size: 1rem;
    width: 32px; height: 38px;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    font-family: 'DM Mono', monospace;
  }
  .stepper button:hover { background: var(--accent); color: #fff; }

  /* ── Slider ── */
  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
    margin-top: 4px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent2);
    cursor: pointer;
    border: 2px solid var(--bg);
  }

  /* ── Format selector ── */
  .fmt-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .fmt-btn {
    flex: 1;
    padding: 7px 6px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.03em;
    cursor: pointer;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
    white-space: nowrap;
  }
  .fmt-btn:hover { border-color: var(--accent2); color: var(--text); }
  .fmt-btn.active {
    background: var(--accent2);
    border-color: var(--accent2);
    color: #000;
    font-weight: 500;
  }

  /* ── Generate button ── */
  .btn-generate {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    margin-top: 4px;
    box-shadow: 0 0 0 0 var(--glow-r);
  }
  .btn-generate:hover {
    background: var(--accent-h);
    box-shadow: 0 0 18px var(--glow-r);
  }
  .btn-generate:active { transform: scale(0.98); }
  .btn-generate:disabled {
    background: var(--border);
    color: var(--muted);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* ── Preview area ── */
  .preview-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .canvas-wrap {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    min-height: 400px;
    overflow: hidden;
  }

  #springViewport {
    width: 100%;
    height: 100%;
    display: block;
    cursor: grab;
  }
  #springViewport:active { cursor: grabbing; }

  .preview-label {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    pointer-events: none;
  }

  /* ── Status bar ── */
  .status {
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.04em;
    min-height: 40px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status.error   { border-color: var(--accent);  color: var(--accent);  }
  .status.success { border-color: var(--accent2); color: var(--accent2); }

  /* ── Spinner ── */
  .spinner {
    width: 12px; height: 12px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #springViewport canvas {
    position: absolute;
    inset: 0;
  }

  /* ── Footer watermark ── */
  footer {
    width: 100%;
    padding: 10px 32px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: var(--surface);
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  footer .dot { color: var(--border); }
  footer .r { color: var(--accent); }
  footer .b { color: var(--accent2); }
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Redeemed 3D logo">
  </div>
  <div class="header-brand">
    <div class="brand-name">
      <span class="brand-red">REDEEMED</span><span class="brand-blue"> 3D</span>
    </div>
    <div class="brand-sub">Spring Generator</div>
  </div>
  <span class="badge">Local · No Cloud · No Credits</span>
</header>

<main>
  <!-- ── Control panel ── -->
  <div class="panel">
    <div class="panel-title">Customize</div>

    <div class="param">
      <label>Coils</label>
      <div class="param-row">
        <input type="number" id="coils" value="15" min="1" max="50" step="1">
        <div class="stepper">
          <button onclick="step('coils',-1)">−</button>
          <button onclick="step('coils',+1)">+</button>
        </div>
      </div>
    </div>

    <div class="param">
      <label>Thickness (mm)</label>
      <div class="param-row">
        <input type="number" id="thickness" value="1.7" min="0.2" max="20" step="0.1">
        <div class="stepper">
          <button onclick="step('thickness',-0.1)">−</button>
          <button onclick="step('thickness',+0.1)">+</button>
        </div>
      </div>
      <input type="range" id="thickness_range" min="0.2" max="10" step="0.1" value="1.7"
             oninput="sync('thickness',this.value)">
    </div>

    <div class="param">
      <label>Width (mm)</label>
      <div class="param-row">
        <input type="number" id="width" value="2" min="0.2" max="20" step="0.1">
        <div class="stepper">
          <button onclick="step('width',-0.1)">−</button>
          <button onclick="step('width',+0.1)">+</button>
        </div>
      </div>
      <input type="range" id="width_range" min="0.2" max="10" step="0.1" value="2"
             oninput="sync('width',this.value)">
    </div>

    <div class="param">
      <label>Pitch (mm)</label>
      <div class="param-row">
        <input type="number" id="pitch" value="4" min="0.5" max="50" step="0.5">
        <div class="stepper">
          <button onclick="step('pitch',-0.5)">−</button>
          <button onclick="step('pitch',+0.5)">+</button>
        </div>
      </div>
    </div>

    <div class="param">
      <label>Inside Diameter (mm)</label>
      <div class="param-row">
        <input type="number" id="inside_dia" value="6" min="1" max="200" step="0.5">
        <div class="stepper">
          <button onclick="step('inside_dia',-0.5)">−</button>
          <button onclick="step('inside_dia',+0.5)">+</button>
        </div>
      </div>
    </div>

    <div class="param">
      <label>Support Gap (mm) <span style="color:var(--muted);font-size:0.65rem">— 0 = off</span></label>
      <div class="param-row">
        <input type="number" id="support_gap" value="0.25" min="0" max="5" step="0.05">
        <div class="stepper">
          <button onclick="step('support_gap',-0.05)">−</button>
          <button onclick="step('support_gap',+0.05)">+</button>
        </div>
      </div>
      <input type="range" id="support_gap_range" min="0" max="2" step="0.05" value="0.25"
             oninput="sync('support_gap',this.value)">
    </div>

    <div class="param">
      <label>Format</label>
      <div class="fmt-group" id="fmtGroup">
        <button class="fmt-btn active" data-fmt="stl" onclick="setFmt(this)">STL</button>
        <button class="fmt-btn" data-fmt="3mf_bambu" onclick="setFmt(this)">3MF — Bambu / Orca</button>
        <button class="fmt-btn" data-fmt="3mf_snapmaker" onclick="setFmt(this)">3MF — Snapmaker</button>
      </div>
    </div>

    <button class="btn-generate" id="genBtn" onclick="generate()">⬇ Generate &amp; Download</button>
  </div>

  <!-- ── Preview + status ── -->
  <div class="preview-area">
    <div class="canvas-wrap">
      <div id="springViewport" aria-label="3D spring preview"></div>
      <div class="preview-label">3D preview — drag to orbit · scroll to zoom</div>
    </div>
    <div class="status" id="status">
      <div class="spinner" id="spinner"></div>
      <span id="statusText">Enter parameters and click Generate to download your file.</span>
    </div>
  </div>
</main>

<footer>
  <span class="r">Redeemed</span><span class="b"> 3D</span>
  <span class="dot">·</span>
  <span>Spring Generator</span>
  <span class="dot">·</span>
  <span>Local · No Cloud</span>
</footer>

<script src="{{ url_for('static', filename='spring_ui.js') }}" defer></script>

</body>
</html>
