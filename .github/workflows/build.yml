name: Build executables

# Runs on every push to main, and on version tags.
# Tagged runs also publish the binaries as GitHub Release assets.
on:
  push:
    branches: [main]
    tags:     ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:     # allow manual trigger from the Actions tab

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
            asset: spring_generator.exe
          - os: ubuntu-latest
            label: linux
            asset: spring_generator
          - os: macos-latest
            label: macos
            asset: spring_generator

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: spring_app
        run: pip install flask numpy pyinstaller

      - name: Build with PyInstaller
        working-directory: spring_app
        run: pyinstaller spring_generator.spec

      # ---- rename so all three assets have unique names in a release ----
      - name: Rename binary (Linux)
        if: matrix.label == 'linux'
        run: mv spring_app/dist/spring_generator spring_app/dist/spring_generator-linux

      - name: Rename binary (macOS)
        if: matrix.label == 'macos'
        run: mv spring_app/dist/spring_generator spring_app/dist/spring_generator-macos

      - name: Rename binary (Windows)
        if: matrix.label == 'windows'
        shell: pwsh
        run: Rename-Item spring_app/dist/spring_generator.exe spring_generator-windows.exe

      # ---- upload as a workflow artifact (available for 30 days) ----
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spring-generator-${{ matrix.label }}
          path: spring_app/dist/spring_generator-${{ matrix.label }}*

      # ---- attach to GitHub Release when a v* tag is pushed ----
      - name: Publish to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: spring_app/dist/spring_generator-${{ matrix.label }}*
